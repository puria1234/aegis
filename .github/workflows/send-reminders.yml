name: Send Warranty Reminders

on:
  schedule:
    # Runs every day at 8:00 AM UTC
    - cron: '0 8 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  send-reminders:
    name: Trigger reminder emails
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call send-reminders API
        run: |
          STATUS=$(curl --silent --output /tmp/response.json --write-out "%{http_code}" \
            --request GET \
            --header "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_BASE_URL }}/api/cron/send-reminders")

          echo "HTTP status: $STATUS"
          echo "Response:"
          cat /tmp/response.json

          if [ "$STATUS" -ne 200 ]; then
            echo "❌ Cron job failed with status $STATUS"
            exit 1
          fi

          echo "✅ Cron job completed successfully"
